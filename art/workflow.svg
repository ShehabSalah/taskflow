<svg width="1100" height="140" viewBox="0 0 1100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1100" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#8b5cf6"/>
      <stop offset="0.85" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="140" rx="16" fill="#111115" stroke="#27272a"/>
  <line x1="80" y1="70" x2="1020" y2="70" stroke="url(#line)" stroke-width="2"/>
  <!-- Step 1 -->
  <circle cx="110" cy="70" r="28" fill="#111115" stroke="#8b5cf6" stroke-width="2"/>
  <text x="110" y="76" fill="#e9d5ff" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">1</text>
  <text x="110" y="118" fill="#a1a1aa" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Workspace</text>
  <!-- Step 2 -->
  <circle cx="290" cy="70" r="28" fill="#111115" stroke="#7c3aed" stroke-width="2"/>
  <text x="290" y="76" fill="#ddd6fe" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">2</text>
  <text x="290" y="118" fill="#a1a1aa" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Projects</text>
  <!-- Step 3 -->
  <circle cx="470" cy="70" r="28" fill="#111115" stroke="#6366f1" stroke-width="2"/>
  <text x="470" y="76" fill="#c7d2fe" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">3</text>
  <text x="470" y="118" fill="#a1a1aa" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Tasks</text>
  <!-- Step 4 -->
  <circle cx="650" cy="70" r="28" fill="#111115" stroke="#3b82f6" stroke-width="2"/>
  <text x="650" y="76" fill="#bfdbfe" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">4</text>
  <text x="650" y="118" fill="#a1a1aa" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Time</text>
  <!-- Step 5 -->
  <circle cx="830" cy="70" r="28" fill="#111115" stroke="#10b981" stroke-width="2"/>
  <text x="830" y="76" fill="#a7f3d0" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">5</text>
  <text x="830" y="118" fill="#a1a1aa" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Earnings</text>
  <!-- Step 6 -->
  <circle cx="1010" cy="70" r="28" fill="#111115" stroke="#f59e0b" stroke-width="2"/>
  <text x="1010" y="76" fill="#fde68a" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">6</text>
  <text x="1010" y="118" fill="#a1a1aa" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Reports</text>
